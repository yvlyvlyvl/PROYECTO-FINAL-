{% extends 'crud_app/base.html' %}
{% load static %}

{% block title %}Recuperar Cuenta — ProyectoUCC{% endblock %}

{% block content %}

<style>
  body {
    background-image: url("{% static 'crud_app/imagenes/tienda.jpg' %}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }
</style>

<div class="login-wrapper d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="card shadow" style="width:100%; max-width:420px; border-radius:14px;">
    <div class="card-body p-4">

      <div class="text-center mb-4">
        <div style="width:60px; height:60px; background:#eff6ff; border-radius:50%;
                    display:flex; align-items:center; justify-content:center;
                    margin:0 auto; font-size:1.8rem;">
          📧
        </div>
        <h2 class="mt-3 fw-bold">Recuperar Cuenta</h2>
        <p class="text-muted" style="font-size:13px;">
          Ingresa tu correo y te enviaremos un código de verificación
        </p>
      </div>

      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-bold">Correo electrónico</label>
          <input type="email" class="form-control" name="correo"
                 placeholder="Tu correo registrado" required>
        </div>
        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary">
            📨 Enviar código
          </button>
        </div>
        <p class="text-center" style="font-size:13px;">
          <a href="{% url 'login' %}">← Volver al login</a>
        </p>
      </form>

    </div>
  </div>
</div>

{% endblock %}
